{% extends 'base.html' %}

{% block content %}
<div class="container-fluid">
    <div class="card" style="max-width: 600px; margin: 0 auto;">
        <h2 style="color: var(--primary-color);">Send Notification</h2>

        <form method="post">
            {% csrf_token %}

            <label>Select Class:</label>
            <select name="class_id" required>
                {% for cls in classes %}
                <option value="{{ cls.id }}">{{ cls.name }}</option>
                {% endfor %}
            </select>

            <label>Subject:</label>
            <input type="text" name="subject" placeholder="e.g. Mentoring Session Tomorrow" required>

            <label>Message:</label>
            <textarea name="message" rows="5" required placeholder="Enter your message here..."></textarea>

            <button type="submit" class="btn">Send Email</button>
        </form>
    </div>
</div>
{% endblock %}
