{% extends 'base.html' %}

{% block content %}
<div class="container-fluid">
    <div class="card" style="max-width: 600px; margin: 0 auto;">
        <h2 style="color: var(--primary-color);">Add New Subject</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn">Add Subject</button>
        </form>
    </div>
</div>
{% endblock %}
