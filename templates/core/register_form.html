{% extends 'base.html' %}

{% block content %}
<div class="auth-container">
    <div class="auth-box">
        <h2 style="color: var(--primary-color);">Register as {{ user_type }}</h2>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn" style="width: 100%; margin-top: 20px;">Create Account</button>
        </form>
    </div>
</div>
{% endblock %}
